<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruFleet – View Fleet</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0d12; --surface:#13131a; --card:#1a1a24; --border:rgba(255,255,255,.07);
      --accent:#6c63ff; --accent2:#00d4aa; --text:#e8e8f0; --muted:#7a7a9a;
      --danger:#ff4d6d; --warning:#ffb347; --nav-w:240px;
    }
    body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
    .sidebar { width:var(--nav-w); min-height:100vh; background:var(--surface); border-right:1px solid var(--border);
      display:flex; flex-direction:column; padding:28px 0; position:fixed; top:0; left:0; z-index:100; }
    .logo { display:flex; align-items:center; gap:10px; padding:0 24px 28px; border-bottom:1px solid var(--border); }
    .logo-icon { width:36px; height:36px; background:var(--accent); border-radius:10px; display:grid; place-items:center; font-size:18px; color:#fff; flex-shrink:0; }
    .logo-text { font-size:20px; font-weight:700; letter-spacing:-.3px; }
    .logo-text span { color:var(--accent); }
    nav { flex:1; padding:20px 12px; }
    nav a { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:10px;
      color:var(--muted); text-decoration:none; font-size:14px; font-weight:500; margin-bottom:4px; transition:all .2s; }
    nav a:hover, nav a.active { background:rgba(108,99,255,.12); color:var(--text); }
    nav a.active { color:var(--accent); }
    nav a i { width:18px; text-align:center; font-size:15px; }
    .sidebar-foot { padding:16px 24px; border-top:1px solid var(--border); }
    .user-chip { display:flex; align-items:center; gap:10px; }
    .avatar { width:36px; height:36px; border-radius:50%; background:var(--accent); display:grid; place-items:center;
      font-weight:700; font-size:14px; flex-shrink:0; }
    .user-info .name { font-size:13px; font-weight:600; }
    .user-info .role { font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:.5px; }
    .logout-btn { margin-top:10px; width:100%; background:rgba(255,77,109,.1); border:1px solid rgba(255,77,109,.25);
      color:var(--danger); border-radius:8px; padding:8px; font-family:'Outfit',sans-serif;
      font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
    .logout-btn:hover { background:rgba(255,77,109,.2); }
    .main { margin-left:var(--nav-w); flex:1; padding:28px 32px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .page-title { font-size:22px; font-weight:700; }
    .page-title span { color:var(--accent); }
    .header-right { display:flex; align-items:center; gap:12px; }
    .search-box { display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border);
      border-radius:10px; padding:8px 14px; }
    .search-box input { background:none; border:none; color:var(--text); font-size:13px;
      font-family:'Outfit',sans-serif; width:200px; outline:none; }
    .search-box input::placeholder { color:var(--muted); }
    .search-box i { color:var(--muted); font-size:13px; }
    .filter-btns { display:flex; gap:6px; }
    .filter-btn { padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--card);
      color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; font-family:'Outfit',sans-serif; }
    .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(108,99,255,.08); }
    .fleet-count { font-size:13px; color:var(--muted); }
    .fleet-count strong { color:var(--text); }
    .fleet-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:16px; }
    .vehicle-card {
      background:var(--card); border:1px solid var(--border); border-radius:16px;
      overflow:hidden; cursor:pointer; transition:all .25s; position:relative;
    }
    .vehicle-card:hover { transform:translateY(-3px); box-shadow:0 12px 32px rgba(0,0,0,.35), 0 0 0 1px var(--accent); }
    .card-header { padding:16px 18px 12px; display:flex; align-items:flex-start; justify-content:space-between; }
    .vehicle-img { width:100%; height:130px; object-fit:cover; background:rgba(255,255,255,.03);
      border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .vehicle-img i { font-size:52px; color:rgba(255,255,255,.06); }
    .vehicle-reg { font-size:18px; font-weight:700; letter-spacing:1px; }
    .vehicle-type { font-size:12px; color:var(--muted); margin-top:2px; }
    .status-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; flex-shrink:0; }
    .st-on-road  { background:rgba(108,99,255,.15); color:var(--accent); }
    .st-idle     { background:rgba(0,212,170,.12);  color:var(--accent2); }
    .st-maintenance { background:rgba(255,179,71,.12); color:var(--warning); }
    .st-blocked  { background:rgba(255,77,109,.1);  color:var(--danger); }
    .card-body { padding:0 18px 16px; }
    .card-meta { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .meta-item { display:flex; flex-direction:column; gap:2px; }
    .meta-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    .meta-value { font-size:13px; font-weight:600; }
    .card-driver { display:flex; align-items:center; gap:8px; padding:10px 12px;
      background:var(--surface); border-radius:10px; border:1px solid var(--border); }
    .driver-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent);
      display:grid; place-items:center; font-size:11px; font-weight:700; flex-shrink:0; }
    .driver-name { font-size:12px; font-weight:600; }
    .driver-sub { font-size:10px; color:var(--muted); }
    .no-driver { color:var(--muted); font-size:12px; font-style:italic; }
    .empty-state { text-align:center; padding:64px 0; color:var(--muted); }
    .empty-state i { font-size:40px; display:block; margin-bottom:12px; opacity:.3; }
    /* Drawer */
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:none; }
    .drawer-overlay.open { display:block; }
    .drawer { position:fixed; right:0; top:0; bottom:0; width:420px; background:var(--surface);
      border-left:1px solid var(--border); z-index:201; transform:translateX(100%);
      transition:transform .3s cubic-bezier(.4,0,.2,1); overflow-y:auto; }
    .drawer.open { transform:translateX(0); }
    .drawer-head { padding:20px 24px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; position:sticky; top:0;
      background:var(--surface); z-index:1; }
    .drawer-head h2 { font-size:16px; font-weight:700; }
    .drawer-close { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; }
    .drawer-body { padding:20px 24px; }
    .detail-section { margin-bottom:20px; }
    .detail-section h3 { font-size:11px; color:var(--muted); text-transform:uppercase;
      letter-spacing:.8px; margin-bottom:12px; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .detail-item { display:flex; flex-direction:column; gap:3px; background:var(--card);
      border:1px solid var(--border); border-radius:10px; padding:12px; }
    .detail-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    .detail-value { font-size:14px; font-weight:600; }
    .skel { height:16px; border-radius:5px; background:rgba(255,255,255,.06); animation:shimmer 1.4s infinite; }
    @keyframes shimmer { 50% { opacity:.4; } }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon"><i class="fas fa-truck-fast"></i></div>
    <div class="logo-text">Tru<span>Fleet</span></div>
  </div>
  <nav>
    <a href="Dashboard_manager.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
    <a href="View_fleet_manager.html" class="active"><i class="fas fa-truck"></i> View Fleet</a>
    <a href="Drivers_manager.html"><i class="fas fa-id-badge"></i> Drivers</a>
    <a href="Maintenance_manager.html"><i class="fas fa-wrench"></i> Maintenance</a>
  </nav>
  <div class="sidebar-foot">
    <div class="user-chip">
      <div class="avatar" id="avatarInitial">M</div>
      <div class="user-info">
        <div class="name" id="userName">Loading...</div>
        <div class="role">Manager</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</button>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Fleet <span>Overview</span></div>
      <div class="fleet-count" style="margin-top:4px;">Total: <strong id="fleetCount">—</strong> vehicles</div>
    </div>
    <div class="header-right">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by reg, driver, type" oninput="applyFilter()" />
      </div>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
        <button class="filter-btn" data-filter="on-road" onclick="setFilter(this)">On Road</button>
        <button class="filter-btn" data-filter="idle" onclick="setFilter(this)">Idle</button>
        <button class="filter-btn" data-filter="maintenance" onclick="setFilter(this)">Maint.</button>
      </div>
    </div>
  </div>
  <div class="fleet-grid" id="fleetGrid">
    <div class="empty-state" style="grid-column:1/-1"><i class="fas fa-spinner fa-spin"></i>Loading fleet</div>
  </div>
</main>

<!-- Drawer -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2 id="drawerTitle">Vehicle Details</h2>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
const TOKEN = localStorage.getItem('trufleet_token');
if (!TOKEN) location.href = '../login.html';
function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch { return null; } }
const ME = parseJwt(TOKEN);
if (!ME || (ME.role !== 'manager' && ME.role !== 'admin')) { localStorage.clear(); location.href = '../login.html'; }
const name = ME.full_name || ME.email || 'Manager';
document.getElementById('userName').textContent = name;
document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();
function logout() { localStorage.clear(); location.href = '../login.html'; }
async function apiFetch(path, opts={}) {
  const res = await fetch(path, { ...opts, headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json',...(opts.headers||{})} });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error||'API error'); }
  return res.json();
}
let fleetData = [];
let activeFilter = 'all';
const STATUS_LABEL = { 'on-road':'On Road', 'idle':'Idle', 'maintenance':'Maintenance', 'blocked':'Blocked', 'active':'Idle' };
function statusClass(s) {
  if (s==='on-road') return 'st-on-road';
  if (s==='maintenance') return 'st-maintenance';
  if (s==='blocked') return 'st-blocked';
  return 'st-idle';
}
function renderCards(data) {
  const grid = document.getElementById('fleetGrid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-truck"></i>No vehicles match your filter.</div>';
    return;
  }
  grid.innerHTML = data.map(v => {
    const st = v.computed_status || v.status || 'idle';
    const stLbl = STATUS_LABEL[st] || st;
    const driverName = typeof v.assigned_driver === 'string' ? v.assigned_driver : null;
    const trip = v.current_trip;
    return `
      <div class="vehicle-card" onclick="openDrawer('${v.id}')">
        <div class="vehicle-img"><i class="fas fa-truck-front"></i></div>
        <div class="card-header">
          <div>
            <div class="vehicle-reg">${v.registration_number || '—'}</div>
            <div class="vehicle-type">${v.make||''} ${v.model||''} ${v.year?'('+v.year+')':''}</div>
          </div>
          <span class="status-badge ${statusClass(st)}">${stLbl}</span>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <div class="meta-item">
              <div class="meta-label">Type</div>
              <div class="meta-value">${v.vehicle_type || '—'}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Capacity</div>
              <div class="meta-value">${v.capacity ? v.capacity+' T' : '—'}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Route</div>
              <div class="meta-value" style="font-size:11px">${trip ? (trip.origin+'  '+trip.destination) : '—'}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Fuel</div>
              <div class="meta-value">${v.fuel_level != null ? v.fuel_level+'%' : '—'}</div>
            </div>
          </div>
          ${driverName
            ? `<div class="card-driver"><div class="driver-avatar">${driverName.charAt(0).toUpperCase()}</div><div><div class="driver-name">${driverName}</div><div class="driver-sub">Assigned Driver</div></div></div>`
            : `<div class="card-driver"><i class="fas fa-user-slash" style="color:var(--muted)"></i><span class="no-driver">&nbsp;No driver assigned</span></div>`
          }
        </div>
      </div>`;
  }).join('');
}
function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilter();
}
function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let data = fleetData;
  if (activeFilter !== 'all') {
    data = data.filter(v => {
      const st = v.computed_status || v.status || 'idle';
      return st === activeFilter || (activeFilter === 'idle' && st === 'active');
    });
  }
  if (q) {
    data = data.filter(v =>
      (v.registration_number||'').toLowerCase().includes(q) ||
      (v.make||'').toLowerCase().includes(q) ||
      (v.model||'').toLowerCase().includes(q) ||
      (v.vehicle_type||'').toLowerCase().includes(q) ||
      (v.assigned_driver?.full_name||'').toLowerCase().includes(q)
    );
  }
  document.getElementById('fleetCount').textContent = activeFilter === 'all' && !q ? fleetData.length : `${data.length}/${fleetData.length}`;
  renderCards(data);
}
function openDrawer(id) {
  const v = fleetData.find(x=>x.id===id); if(!v) return;
  const st = v.computed_status || v.status || 'idle';
  document.getElementById('drawerTitle').textContent = v.registration_number || 'Vehicle';
  const trip = v.current_trip;
  document.getElementById('drawerBody').innerHTML = `
    <div class="detail-section">
      <h3>Status</h3>
      <span class="status-badge ${statusClass(st)}" style="font-size:13px;padding:6px 14px">${STATUS_LABEL[st]||st}</span>
    </div>
    <div class="detail-section">
      <h3>Vehicle Info</h3>
      <div class="detail-grid">
        <div class="detail-item"><span class="detail-label">Registration</span><span class="detail-value">${v.registration_number||'—'}</span></div>
        <div class="detail-item"><span class="detail-label">Type</span><span class="detail-value">${v.vehicle_type||'—'}</span></div>
        <div class="detail-item"><span class="detail-label">Make</span><span class="detail-value">${v.make||'—'}</span></div>
        <div class="detail-item"><span class="detail-label">Model</span><span class="detail-value">${v.model||'—'}</span></div>
        <div class="detail-item"><span class="detail-label">Year</span><span class="detail-value">${v.year||'—'}</span></div>
        <div class="detail-item"><span class="detail-label">Capacity</span><span class="detail-value">${v.capacity ? v.capacity+' T' : '—'}</span></div>
        <div class="detail-item"><span class="detail-label">Fuel Level</span><span class="detail-value">${v.fuel_level != null ? v.fuel_level+'%' : '—'}</span></div>
        <div class="detail-item"><span class="detail-label">Location</span><span class="detail-value" style="font-size:12px">${v.current_location||'—'}</span></div>
      </div>
    </div>
    ${trip ? `<div class="detail-section"><h3>Active Trip</h3><div class="detail-grid">
      <div class="detail-item" style="grid-column:1/-1"><span class="detail-label">Route</span><span class="detail-value">${trip.origin}  ${trip.destination}</span></div>
      <div class="detail-item"><span class="detail-label">Cargo</span><span class="detail-value">${trip.cargo_type||'—'}${trip.cargo_weight?' ('+trip.cargo_weight+')':''}</span></div>
      <div class="detail-item"><span class="detail-label">Trip Status</span><span class="detail-value">${trip.status||'—'}</span></div>
    </div></div>` : ''}
    ${v.assigned_driver ? `<div class="detail-section"><h3>Assigned Driver</h3><div class="card-driver" style="background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px;">
      <div class="driver-avatar">${String(v.assigned_driver).charAt(0).toUpperCase()}</div>
      <div><div class="driver-name">${v.assigned_driver}</div><div class="driver-sub">Assigned Driver</div></div>
    </div></div>` : ''}
  `;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
async function loadFleet() {
  try {
    const data = await apiFetch('/api/manager/fleet');
    fleetData = Array.isArray(data) ? data : (data.vehicles || []);
    document.getElementById('fleetCount').textContent = fleetData.length;
    applyFilter();
  } catch(e) {
    console.error(e);
    document.getElementById('fleetGrid').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-exclamation-triangle"></i>Could not load fleet data.</div>';
  }
}
loadFleet();
</script>
</body>
</html>
