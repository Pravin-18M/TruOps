<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trufleet | Secure Access</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚚</text></svg>">
    
    <!-- External Dependencies: Premium Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK (Ready for Integration) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* 
         * DESIGN SYSTEM & TOKENS 
         */
        :root {
            --bg-pure: #FFFFFF;
            --bg-off: #F8FAFC;
            --primary: #0F172A; /* Slate 900 */
            --accent: #2563EB; /* Royal Blue */
            --accent-hover: #1D4ED8;
            --text-main: #334155;
            --text-light: #64748B;
            --border: #E2E8F0;
            
            --shadow-card: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-pure);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* 
         * LEFT SIDE - CONTEXTUAL VISUAL
         */
        .visual-side {
            width: 50%;
            background-color: var(--bg-off);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .visual-content {
            width: 72%;
            text-align: center;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-card);
            padding: 2.5rem 2rem;
        }

        .visual-content h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .visual-content p {
            color: var(--text-light);
            font-size: 1.1rem;
            max-width: 85%;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* 
         * RIGHT SIDE - LOGIN FORM 
         */
        .login-side {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            background: white;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .brand-header {
            margin-bottom: 2.5rem;
        }

        .brand-logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        .brand-logo i { color: var(--accent); }

        .brand-tagline {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            background: white;
            font-family: 'Inter', sans-serif;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-label {
            position: absolute;
            left: 1rem;
            top: 1rem;
            color: var(--text-light);
            pointer-events: none;
            transition: 0.2s ease all;
            background: white;
            padding: 0 4px;
        }

        .input-field:focus ~ .input-label,
        .input-field:not(:placeholder-shown) ~ .input-label {
            top: -0.6rem;
            left: 0.8rem;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background-color: var(--text-main);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15);
        }

        .utility-links {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .utility-links a {
            text-decoration: none;
            color: var(--text-light);
            transition: 0.3s;
        }

        .utility-links a:hover {
            color: var(--accent);
        }

        /* Status Messages */
        .status-message {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            display: none; /* Hidden by default */
        }

        .status-pending {
            background-color: #FFF7ED;
            color: #C2410C;
            border: 1px solid #FFEDD5;
        }

        .status-success {
            background-color: #ECFDF5;
            color: #047857;
            border: 1px solid #D1FAE5;
        }

        /* Responsive */
        @media (max-width: 900px) {
            body { flex-direction: column-reverse; overflow-y: auto; height: auto; }
            .visual-side { width: 100%; height: 400px; padding: 2rem; }
            .login-side { width: 100%; padding: 3rem 1.5rem; }
            .visual-content { width: 100%; }
            .visual-content h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- LEFT SIDE: STATIC BRAND VISUAL -->
    <div class="visual-side">
        <div class="visual-content">
            <h2>Unified Fleet Access</h2>
            <p>One secure login for every authorized team member. Your role-based dashboard opens automatically.</p>
        </div>
    </div>

    <!-- RIGHT SIDE: LOGIN FORM -->
    <div class="login-side">
        <div class="login-wrapper">
            
            <div class="brand-header">
                <div class="brand-logo">
                    <i class="fa-solid fa-cube"></i> Trufleet
                </div>
                <p class="brand-tagline">Confidence in Every Mile</p>
            </div>

            <!-- Pending Approval Notification (Hidden Logic) -->
            <div id="pendingAlert" class="status-message status-pending">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span><strong>Approval Pending:</strong> Your request has been sent to the Fleet Admin. Please wait for verification.</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <input type="email" class="input-field" id="email" placeholder=" " required>
                    <label class="input-label">Email Address</label>
                </div>

                <div class="form-group">
                    <input type="password" class="input-field" id="password" placeholder=" " required>
                    <label class="input-label">Password</label>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    Access Dashboard <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
                </button>

                <div class="utility-links">
                    <a href="Signup.html">Create New Account</a>
                    <a href="#">Forgot Password?</a>
                </div>
            </form>

        </div>
    </div>

    <!-- LOGIC CONTROLLER -->
    <script>
        // --- Unified LOGIN - CONNECTED TO BACKEND ---
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Loading State
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                btn.innerHTML = originalText;
                btn.disabled = false;

                if (!response.ok) {
                    if (data.error && data.error.toLowerCase().includes('pending approval')) {
                        document.getElementById('pendingAlert').style.display = 'flex';
                    } else {
                        alert(data.error || 'Login failed. Please check your credentials.');
                    }
                    return;
                }

                // Persist auth to localStorage
                localStorage.setItem('trufleet_token', data.token);
                localStorage.setItem('trufleet_user', JSON.stringify(data.user));

                // RBAC-based redirect — each role goes to its own portal
                const redirectMap = {
                    admin:   'Dasboard_admin.html',
                    manager: 'manager/Dashboard_manager.html',
                    driver:  'driver/dashboard_driver.html'
                };
                window.location.href = redirectMap[data.user.role] || 'Dasboard_admin.html';

            } catch (err) {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('Network error. Please ensure the server is running.');
            }
        });

        // Initialize default view
        window.onload = () => {
            // Clear any old session when visiting login
            localStorage.removeItem('trufleet_token');
            localStorage.removeItem('trufleet_user');

            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('registered') === 'true') {
                document.getElementById('pendingAlert').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
