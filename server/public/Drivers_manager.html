<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruFleet – Drivers</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d0d12; --surface:#13131a; --card:#1a1a24; --border:rgba(255,255,255,.07);
      --accent:#6c63ff; --accent2:#00d4aa; --text:#e8e8f0; --muted:#7a7a9a;
      --danger:#ff4d6d; --warning:#ffb347; --nav-w:240px;
    }
    body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
    .sidebar { width:var(--nav-w); min-height:100vh; background:var(--surface); border-right:1px solid var(--border);
      display:flex; flex-direction:column; padding:28px 0; position:fixed; top:0; left:0; z-index:100; }
    .logo { display:flex; align-items:center; gap:10px; padding:0 24px 28px; border-bottom:1px solid var(--border); }
    .logo-icon { width:36px; height:36px; background:var(--accent); border-radius:10px; display:grid; place-items:center; font-size:18px; color:#fff; }
    .logo-text { font-size:20px; font-weight:700; letter-spacing:-.3px; }
    .logo-text span { color:var(--accent); }
    nav { flex:1; padding:20px 12px; }
    nav a { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:10px;
      color:var(--muted); text-decoration:none; font-size:14px; font-weight:500; margin-bottom:4px; transition:all .2s; }
    nav a:hover, nav a.active { background:rgba(108,99,255,.12); color:var(--text); }
    nav a.active { color:var(--accent); }
    nav a i { width:18px; text-align:center; font-size:15px; }
    .sidebar-foot { padding:16px 24px; border-top:1px solid var(--border); }
    .user-chip { display:flex; align-items:center; gap:10px; }
    .avatar { width:36px; height:36px; border-radius:50%; background:var(--accent); display:grid; place-items:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .user-info .name { font-size:13px; font-weight:600; }
    .user-info .role { font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:.5px; }
    .logout-btn { margin-top:10px; width:100%; background:rgba(255,77,109,.1); border:1px solid rgba(255,77,109,.25);
      color:var(--danger); border-radius:8px; padding:8px; font-family:'Outfit',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
    .logout-btn:hover { background:rgba(255,77,109,.2); }
    .main { margin-left:var(--nav-w); flex:1; padding:28px 32px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .page-title { font-size:22px; font-weight:700; }
    .page-title span { color:var(--accent); }
    .header-right { display:flex; align-items:center; gap:12px; }
    .search-box { display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 14px; }
    .search-box input { background:none; border:none; color:var(--text); font-size:13px; font-family:'Outfit',sans-serif; width:200px; outline:none; }
    .search-box input::placeholder { color:var(--muted); }
    .search-box i { color:var(--muted); font-size:13px; }
    .filter-btns { display:flex; gap:6px; }
    .filter-btn { padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:var(--card);
      color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; font-family:'Outfit',sans-serif; }
    .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(108,99,255,.08); }
    .driver-count { font-size:13px; color:var(--muted); }
    .driver-count strong { color:var(--text); }

    /* Driver grid */
    .driver-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .driver-card {
      background:var(--card); border:1px solid var(--border); border-radius:16px;
      padding:20px; cursor:pointer; transition:all .25s;
    }
    .driver-card:hover { transform:translateY(-3px); box-shadow:0 12px 32px rgba(0,0,0,.35),0 0 0 1px var(--accent); }
    .card-top { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .d-avatar { width:52px; height:52px; border-radius:50%; display:grid; place-items:center;
      font-size:20px; font-weight:700; flex-shrink:0; color:#fff; }
    .d-name { font-size:16px; font-weight:700; }
    .d-id { font-size:11px; color:var(--muted); margin-top:2px; }
    .status-pill { padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; }
    .st-active { background:rgba(0,212,170,.12); color:var(--accent2); }
    .st-on-trip { background:rgba(108,99,255,.15); color:var(--accent); }
    .st-off-duty { background:rgba(122,122,154,.12); color:var(--muted); }
    .st-suspended { background:rgba(255,77,109,.1); color:var(--danger); }
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
    .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
    .stat-val { font-size:18px; font-weight:700; }
    .stat-lbl { font-size:10px; color:var(--muted); margin-top:2px; }
    .card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px;
      border-top:1px solid var(--border); }
    .license { font-size:11px; color:var(--muted); }
    .license strong { color:var(--text); }
    .view-btn { padding:5px 14px; border-radius:8px; background:rgba(108,99,255,.15); border:1px solid rgba(108,99,255,.3);
      color:var(--accent); font-size:12px; font-weight:600; cursor:pointer; font-family:'Outfit',sans-serif; transition:all .2s; }
    .view-btn:hover { background:rgba(108,99,255,.25); }
    .empty-state { text-align:center; padding:64px 0; color:var(--muted); }
    .empty-state i { font-size:40px; display:block; margin-bottom:12px; opacity:.3; }

    /* Drawer */
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:none; }
    .drawer-overlay.open { display:block; }
    .drawer { position:fixed; right:0; top:0; bottom:0; width:420px; background:var(--surface);
      border-left:1px solid var(--border); z-index:201; transform:translateX(100%);
      transition:transform .3s cubic-bezier(.4,0,.2,1); overflow-y:auto; }
    .drawer.open { transform:translateX(0); }
    .drawer-head { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center;
      justify-content:space-between; position:sticky; top:0; background:var(--surface); z-index:1; }
    .drawer-head h2 { font-size:16px; font-weight:700; }
    .drawer-close { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; }
    .drawer-body { padding:20px 24px; }
    .detail-section { margin-bottom:20px; }
    .detail-section h3 { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:12px; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .detail-item { display:flex; flex-direction:column; gap:3px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; }
    .detail-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
    .detail-value { font-size:14px; font-weight:600; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon"><i class="fas fa-truck-fast"></i></div>
    <div class="logo-text">Tru<span>Fleet</span></div>
  </div>
  <nav>
    <a href="Dashboard_manager.html"><i class="fas fa-gauge-high"></i> Dashboard</a>
    <a href="View_fleet_manager.html"><i class="fas fa-truck"></i> View Fleet</a>
    <a href="Drivers_manager.html" class="active"><i class="fas fa-id-badge"></i> Drivers</a>
    <a href="Maintenance_manager.html"><i class="fas fa-wrench"></i> Maintenance</a>
  </nav>
  <div class="sidebar-foot">
    <div class="user-chip">
      <div class="avatar" id="avatarInitial">M</div>
      <div class="user-info">
        <div class="name" id="userName">Loading...</div>
        <div class="role">Manager</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</button>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Driver <span>Management</span></div>
      <div class="driver-count" style="margin-top:4px;">Total: <strong id="driverCount">—</strong> drivers</div>
    </div>
    <div class="header-right">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by name, licence, phone" oninput="applyFilter()" />
      </div>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
        <button class="filter-btn" data-filter="on-trip" onclick="setFilter(this)">On Trip</button>
        <button class="filter-btn" data-filter="available" onclick="setFilter(this)">Available</button>
        <button class="filter-btn" data-filter="off-duty" onclick="setFilter(this)">Off Duty</button>
      </div>
    </div>
  </div>
  <div class="driver-grid" id="driverGrid">
    <div class="empty-state" style="grid-column:1/-1"><i class="fas fa-spinner fa-spin"></i>Loading drivers</div>
  </div>
</main>

<!-- Drawer -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2 id="drawerTitle">Driver Details</h2>
    <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
const TOKEN = localStorage.getItem('trufleet_token');
if (!TOKEN) location.href = '../login.html';
function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch { return null; } }
const ME = parseJwt(TOKEN);
if (!ME || (ME.role !== 'manager' && ME.role !== 'admin')) { localStorage.clear(); location.href = '../login.html'; }
const name = ME.full_name || ME.email || 'Manager';
document.getElementById('userName').textContent = name;
document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();
function logout() { localStorage.clear(); location.href = '../login.html'; }
async function apiFetch(path, opts={}) {
  const res = await fetch(path, { ...opts, headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json',...(opts.headers||{})} });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error||'API error'); }
  return res.json();
}
let driversData = [];
let activeFilter = 'all';

const AVATAR_COLORS = ['#6c63ff','#00d4aa','#ff6b9d','#f7b731','#26de81','#fd9644'];
function avatarColor(str) { let h=0; for(let c of str){h=c.charCodeAt(0)+h*31;} return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length]; }

function statusClass(s) {
  if (s==='on-trip') return 'st-on-trip';
  if (s==='available') return 'st-active';
  if (s==='suspended') return 'st-suspended';
  return 'st-off-duty';
}
function statusLabel(s) {
  const m = {'on-trip':'On Trip','available':'Available','off-duty':'Off Duty','suspended':'Suspended'};
  return m[s] || s || 'Unknown';
}

function renderCards(data) {
  const grid = document.getElementById('driverGrid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-id-badge"></i>No drivers match your filter.</div>';
    return;
  }
  grid.innerHTML = data.map(d => {
    const profile = d.driver_profiles?.[0] || d.driver_profile || {};
    const st = profile.status || 'off-duty';
    const score = profile.safety_score != null ? profile.safety_score : '—';
    const miles = profile.miles_this_month != null ? profile.miles_this_month.toLocaleString() : '—';
    const trips  = profile.total_trips != null ? profile.total_trips : '—';
    const color = avatarColor(d.full_name || d.email || 'X');
    return `
      <div class="driver-card" onclick="openDrawer('${d.id}')">
        <div class="card-top">
          <div class="d-avatar" style="background:${color}">${(d.full_name||'?').charAt(0).toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div class="d-name">${d.full_name || 'Unknown'}</div>
            <div class="d-id">${d.email || ''}</div>
          </div>
          <span class="status-pill ${statusClass(st)}">${statusLabel(st)}</span>
        </div>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-val">${score}${score!=='—'?'%':''}</div><div class="stat-lbl">Safety</div></div>
          <div class="stat-box"><div class="stat-val">${trips}</div><div class="stat-lbl">Trips</div></div>
          <div class="stat-box"><div class="stat-val" style="font-size:14px">${miles}</div><div class="stat-lbl">KM/Month</div></div>
        </div>
        <div class="card-footer">
          <div class="license">Licence: <strong>${profile.license_number || '—'}</strong></div>
          <button class="view-btn" onclick="event.stopPropagation();openDrawer('${d.id}')">View Details</button>
        </div>
      </div>`;
  }).join('');
}

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilter();
}
function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let data = driversData;
  if (activeFilter !== 'all') {
    data = data.filter(d => {
      const st = (d.driver_profiles?.[0] || d.driver_profile || {}).status || 'off-duty';
      return st === activeFilter;
    });
  }
  if (q) {
    data = data.filter(d => {
      const p = d.driver_profiles?.[0] || d.driver_profile || {};
      return (d.full_name||'').toLowerCase().includes(q) ||
             (d.email||'').toLowerCase().includes(q) ||
             (p.license_number||'').toLowerCase().includes(q) ||
             (p.phone||'').toLowerCase().includes(q);
    });
  }
  document.getElementById('driverCount').textContent = activeFilter==='all'&&!q ? driversData.length : `${data.length}/${driversData.length}`;
  renderCards(data);
}

function openDrawer(id) {
  const d = driversData.find(x=>x.id===id); if(!d) return;
  const p = d.driver_profiles?.[0] || d.driver_profile || {};
  const st = p.status || 'off-duty';
  const color = avatarColor(d.full_name || d.email || 'X');
  document.getElementById('drawerTitle').textContent = d.full_name || 'Driver';
  document.getElementById('drawerBody').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
      <div style="width:60px;height:60px;border-radius:50%;background:${color};display:grid;place-items:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0">${(d.full_name||'?').charAt(0).toUpperCase()}</div>
      <div>
        <div style="font-size:18px;font-weight:700">${d.full_name||'—'}</div>
        <div style="font-size:12px;color:var(--muted)">${d.email||''}</div>
        <span class="status-pill ${statusClass(st)}" style="display:inline-block;margin-top:6px">${statusLabel(st)}</span>
      </div>
    </div>
    <div class="detail-section">
      <h3>Performance</h3>
      <div class="detail-grid">
        <div class="detail-item"><span class="detail-label">Safety Score</span><span class="detail-value">${p.safety_score!=null?p.safety_score+'%':'—'}</span></div>
        <div class="detail-item"><span class="detail-label">Total Trips</span><span class="detail-value">${p.total_trips??'—'}</span></div>
        <div class="detail-item"><span class="detail-label">KM This Month</span><span class="detail-value">${p.miles_this_month!=null?p.miles_this_month.toLocaleString():' —'}</span></div>
        <div class="detail-item"><span class="detail-label">On-Time Rate</span><span class="detail-value">${p.on_time_rate!=null?p.on_time_rate+'%':'—'}</span></div>
      </div>
    </div>
    <div class="detail-section">
      <h3>License & Contact</h3>
      <div class="detail-grid">
        <div class="detail-item" style="grid-column:1/-1"><span class="detail-label">Licence Number</span><span class="detail-value">${p.license_number||'—'}</span></div>
        <div class="detail-item"><span class="detail-label">Expiry</span><span class="detail-value">${p.license_expiry?new Date(p.license_expiry).toLocaleDateString('en-IN'):'—'}</span></div>
        <div class="detail-item"><span class="detail-label">Phone</span><span class="detail-value">${p.phone||'—'}</span></div>
        <div class="detail-item" style="grid-column:1/-1"><span class="detail-label">Address</span><span class="detail-value" style="font-size:12px">${p.address||'—'}</span></div>
      </div>
    </div>
    <div class="detail-section">
      <h3>Experience</h3>
      <div class="detail-grid">
        <div class="detail-item"><span class="detail-label">Experience</span><span class="detail-value">${p.years_experience!=null?p.years_experience+' yrs':'—'}</span></div>
        <div class="detail-item"><span class="detail-label">Joined</span><span class="detail-value">${d.created_at?new Date(d.created_at).toLocaleDateString('en-IN'):'—'}</span></div>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
async function loadDrivers() {
  try {
    const data = await apiFetch('/api/drivers');
    driversData = Array.isArray(data) ? data : (data.drivers || []);
    document.getElementById('driverCount').textContent = driversData.length;
    applyFilter();
  } catch(e) {
    console.error(e);
    document.getElementById('driverGrid').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-exclamation-triangle"></i>Could not load driver data.</div>';
  }
}
loadDrivers();
</script>
</body>
</html>
